name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: neuro_user
          POSTGRES_PASSWORD: neuro_pass
          POSTGRES_DB: neuro_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neuro_user" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r services/auth_service/requirements.txt
          pip install -r services/reviews_service/requirements.txt

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432 -U neuro_user; do sleep 1; done

      - name: Run Alembic migrations (auth & reviews)
        env:
          DATABASE_URL: postgresql+asyncpg://neuro_user:neuro_pass@localhost:5432/neuro_db
        run: |
          alembic -c services/auth_service/alembic.ini upgrade head
          alembic -c services/reviews_service/alembic.ini upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://neuro_user:neuro_pass@localhost:5432/neuro_db
        run: |
          pytest -q